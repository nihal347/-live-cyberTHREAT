<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THREATWATCH // LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root {
    --bg: #020a0f;
    --bg2: #041018;
    --bg3: #061520;
    --accent: #00d4ff;
    --accent2: #ff3366;
    --accent3: #00ff88;
    --dim: rgba(0,212,255,0.12);
    --border: rgba(0,212,255,0.2);
    --text: #a8d8e8;
    --text-bright: #e0f4ff;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 1fr 320px;
  }

  /* SCANLINE overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* HEADER */
  header {
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 24px;
    position: relative;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent2);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-stats {
    display: flex;
    gap: 28px;
    margin-left: 24px;
  }

  .hstat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .hstat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: rgba(168,216,232,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hstat-value {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
  }

  .hstat-value.danger { color: var(--accent2); }
  .hstat-value.safe { color: var(--accent3); }

  .clock {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 13px;
    color: rgba(168,216,232,0.5);
    letter-spacing: 2px;
  }

  /* MAP */
  #map-container {
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  #map {
    width: 100%;
    height: 100%;
    background: var(--bg) !important;
  }

  /* Leaflet dark overrides */
  .leaflet-container { background: #020a0f !important; }
  .leaflet-tile { filter: brightness(0.18) saturate(0.3) hue-rotate(180deg); }
  .leaflet-control-zoom { display: none; }
  .leaflet-control-attribution { display: none; }

  /* Attack arc canvas overlay */
  #arc-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 500;
  }

  /* Map grid overlay */
  .map-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 400;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Corner brackets */
  .corner { position: absolute; z-index: 600; pointer-events: none; }
  .corner svg { display: block; }
  .c-tl { top: 12px; left: 12px; }
  .c-tr { top: 12px; right: 12px; }
  .c-bl { bottom: 12px; left: 12px; }
  .c-br { bottom: 12px; right: 12px; }

  /* Status bar bottom of map */
  .map-status {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 600;
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(0,212,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* SIDEBAR */
  aside {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel {
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 9px;
    color: rgba(0,212,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .panel-title::before {
    content: '';
    display: block;
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-box {
    background: var(--dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
  }

  .stat-box-label {
    font-family: var(--mono);
    font-size: 8px;
    color: rgba(168,216,232,0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .stat-box-value {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-box-value.red { color: var(--accent2); }
  .stat-box-value.green { color: var(--accent3); }

  /* Country bars */
  .country-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .country-flag {
    font-size: 14px;
    width: 20px;
    text-align: center;
  }

  .country-name {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-bright);
    width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .country-bar-wrap { flex: 1; height: 3px; background: rgba(0,212,255,0.1); border-radius: 2px; }
  .country-bar { height: 100%; background: var(--accent2); border-radius: 2px; transition: width 1s ease; }

  .country-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent2);
    width: 28px;
    text-align: right;
  }

  /* Feed */
  .feed-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .feed-title {
    font-family: var(--mono);
    font-size: 9px;
    color: rgba(0,212,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .feed-title::before {
    content: '';
    display: block;
    width: 4px; height: 4px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 1s infinite;
  }

  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,212,255,0.2) transparent;
  }

  .feed-item {
    padding: 7px 14px;
    border-bottom: 1px solid rgba(0,212,255,0.05);
    animation: slideIn 0.3s ease;
    cursor: default;
    transition: background 0.15s;
  }

  .feed-item:hover { background: rgba(0,212,255,0.04); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .feed-item-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }

  .feed-sev {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sev-high { background: var(--accent2); box-shadow: 0 0 4px var(--accent2); }
  .sev-med  { background: #ffaa00; box-shadow: 0 0 4px #ffaa00; }
  .sev-low  { background: var(--accent3); box-shadow: 0 0 4px var(--accent3); }

  .feed-ip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
  }

  .feed-time {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 9px;
    color: rgba(168,216,232,0.3);
  }

  .feed-detail {
    font-family: var(--sans);
    font-size: 11px;
    color: rgba(168,216,232,0.5);
    padding-left: 11px;
    font-weight: 400;
  }

  .feed-country {
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(168,216,232,0.4);
    padding-left: 11px;
  }

  /* Connection status */
  .conn-status {
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
    box-shadow: 0 0 6px var(--accent3);
  }

  .conn-dot.error { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
</style>
</head>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const WS_URL = 'ws://localhost:8000/ws';
const DEMO_MODE = false; // Set false when backend is running

// ─── CLOCK ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toUTCString().slice(17, 25) + ' UTC';
}
setInterval(updateClock, 1000);
updateClock();

// ─── MAP SETUP ───────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [20, 0], zoom: 2,
  zoomControl: false, attributionControl: false,
  minZoom: 2, maxZoom: 6,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 6, opacity: 1,
}).addTo(map);

// ─── CANVAS ARC SYSTEM ───────────────────────────────────────────────────────
const canvas = document.getElementById('arc-canvas');
const ctx = canvas.getContext('2d');
let arcs = [];

function resizeCanvas() {
  const container = document.getElementById('map-container');
  canvas.width = container.offsetWidth;
  canvas.height = container.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function latLngToCanvas(lat, lng) {
  const point = map.latLngToContainerPoint([lat, lng]);
  return { x: point.x, y: point.y };
}

function addArc(srcLat, srcLng, dstLat, dstLng, severity) {
  const colors = { high: '#ff3366', med: '#ffaa00', low: '#00ff88' };
  arcs.push({
    srcLat, srcLng, dstLat, dstLng,
    color: colors[severity] || '#00d4ff',
    progress: 0, speed: 0.008 + Math.random() * 0.006,
    alive: true,
  });
  if (arcs.length > 40) arcs = arcs.filter(a => a.alive).slice(-40);
}

function drawArcs() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  arcs.forEach(arc => {
    if (!arc.alive) return;
    arc.progress += arc.speed;
    if (arc.progress >= 1.2) { arc.alive = false; return; }

    const src = latLngToCanvas(arc.srcLat, arc.srcLng);
    const dst = latLngToCanvas(arc.dstLat, arc.dstLng);

    // control point for bezier (arc upward)
    const cx = (src.x + dst.x) / 2;
    const cy = (src.y + dst.y) / 2 - Math.abs(src.x - dst.x) * 0.3 - 40;

    const t = Math.min(arc.progress, 1);
    const alpha = arc.progress > 0.9 ? (1.2 - arc.progress) / 0.3 : 1;

    // Draw trail
    ctx.beginPath();
    ctx.strokeStyle = arc.color;
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = alpha * 0.7;
    ctx.shadowColor = arc.color;
    ctx.shadowBlur = 6;

    const steps = 30;
    const startT = Math.max(0, t - 0.3);
    for (let i = 0; i <= steps; i++) {
      const ti = startT + (t - startT) * (i / steps);
      const x = (1-ti)*(1-ti)*src.x + 2*(1-ti)*ti*cx + ti*ti*dst.x;
      const y = (1-ti)*(1-ti)*src.y + 2*(1-ti)*ti*cy + ti*ti*dst.y;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Draw head dot
    const hx = (1-t)*(1-t)*src.x + 2*(1-t)*t*cx + t*t*dst.x;
    const hy = (1-t)*(1-t)*src.y + 2*(1-t)*t*cy + t*t*dst.y;
    ctx.beginPath();
    ctx.arc(hx, hy, 3, 0, Math.PI * 2);
    ctx.fillStyle = arc.color;
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Impact flash at destination
    if (arc.progress > 0.95) {
      const flashAlpha = (1.2 - arc.progress) / 0.25;
      ctx.beginPath();
      ctx.arc(dst.x, dst.y, (arc.progress - 0.95) * 80, 0, Math.PI * 2);
      ctx.strokeStyle = arc.color;
      ctx.globalAlpha = flashAlpha * 0.4;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  });
  requestAnimationFrame(drawArcs);
}
drawArcs();

// ─── MARKERS ─────────────────────────────────────────────────────────────────
function addAttackMarker(lat, lng, severity) {
  const colors = { high: '#ff3366', med: '#ffaa00', low: '#00ff88' };
  const color = colors[severity] || '#00d4ff';
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:8px;height:8px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color};animation:pulse 1s infinite;"></div>`,
    iconSize: [8, 8], iconAnchor: [4, 4],
  });
  const marker = L.marker([lat, lng], { icon }).addTo(map);
  setTimeout(() => map.removeLayer(marker), 8000);
}

// ─── DATA & STATE ─────────────────────────────────────────────────────────────
let totalThreats = 0;
let uniqueIPs = new Set();
let uniqueCountries = new Set();
let countryCounts = {};
let lastMinuteEvents = [];
let categories = {};

const CATEGORIES = ['SSH Bruteforce', 'Port Scan', 'DDoS', 'SQL Injection', 'Malware C2', 'Web Scraper', 'Spam Bot', 'Exploit Attempt'];
const COUNTRY_DATA = {
  'China': { lat: 35.86, lng: 104.19, flag: '🇨🇳' },
  'Russia': { lat: 55.75, lng: 37.61, flag: '🇷🇺' },
  'USA': { lat: 38.90, lng: -77.03, flag: '🇺🇸' },
  'Germany': { lat: 51.16, lng: 10.45, flag: '🇩🇪' },
  'Brazil': { lat: -14.23, lng: -51.92, flag: '🇧🇷' },
  'India': { lat: 20.59, lng: 78.96, flag: '🇮🇳' },
  'Netherlands': { lat: 52.13, lng: 5.29, flag: '🇳🇱' },
  'Ukraine': { lat: 48.37, lng: 31.16, flag: '🇺🇦' },
  'South Korea': { lat: 35.90, lng: 127.76, flag: '🇰🇷' },
  'Iran': { lat: 32.42, lng: 53.68, flag: '🇮🇷' },
  'France': { lat: 46.22, lng: 2.21, flag: '🇫🇷' },
  'Vietnam': { lat: 14.05, lng: 108.27, flag: '🇻🇳' },
  'Bangladesh': { lat: 23.68, lng: 90.35, flag: '🇧🇩' },
  'Japan': { lat: 36.20, lng: 138.25, flag: '🇯🇵' },
  'UK': { lat: 55.37, lng: -3.43, flag: '🇬🇧' },
};

// Common targets (mostly US/EU cloud infra)
const TARGETS = [
  { lat: 37.77, lng: -122.4, name: 'US-West' },
  { lat: 40.71, lng: -74.0, name: 'US-East' },
  { lat: 51.5, lng: -0.12, name: 'EU-London' },
  { lat: 52.5, lng: 13.4, name: 'EU-Frankfurt' },
  { lat: 35.68, lng: 139.69, name: 'AP-Tokyo' },
  { lat: 1.35, lng: 103.81, name: 'AP-Singapore' },
];

function generateDemoEvent() {
  const countries = Object.keys(COUNTRY_DATA);
  const srcCountry = countries[Math.floor(Math.random() * countries.length)];
  const src = COUNTRY_DATA[srcCountry];
  const target = TARGETS[Math.floor(Math.random() * TARGETS.length)];
  const severity = Math.random() < 0.2 ? 'high' : Math.random() < 0.5 ? 'med' : 'low';
  const category = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  const ip = `${Math.floor(Math.random()*220)+10}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
  const score = severity === 'high' ? 80 + Math.floor(Math.random()*20) : severity === 'med' ? 40 + Math.floor(Math.random()*39) : Math.floor(Math.random()*39);

  return {
    ip, srcCountry, srcLat: src.lat + (Math.random()-0.5)*8, srcLng: src.lng + (Math.random()-0.5)*8,
    dstLat: target.lat + (Math.random()-0.5)*2, dstLng: target.lng + (Math.random()-0.5)*2,
    target: target.name, severity, category, score,
    flag: src.flag, ts: new Date(),
  };
}

function processEvent(e) {
  totalThreats++;
  uniqueIPs.add(e.ip);
  uniqueCountries.add(e.srcCountry);
  countryCounts[e.srcCountry] = (countryCounts[e.srcCountry] || 0) + 1;
  categories[e.category] = (categories[e.category] || 0) + 1;
  lastMinuteEvents.push(Date.now());
  lastMinuteEvents = lastMinuteEvents.filter(t => Date.now() - t < 60000);

  addArc(e.srcLat, e.srcLng, e.dstLat, e.dstLng, e.severity);
  addAttackMarker(e.srcLat, e.srcLng, e.severity);
  addFeedItem(e);
  updateStats();
  updateCountries();
}

function addFeedItem(e) {
  const feed = document.getElementById('feed');
  const sevClass = { high: 'sev-high', med: 'sev-med', low: 'sev-low' }[e.severity];
  const timeStr = e.ts.toTimeString().slice(0, 8);

  const el = document.createElement('div');
  el.className = 'feed-item';
  el.innerHTML = `
    <div class="feed-item-top">
      <div class="feed-sev ${sevClass}"></div>
      <span class="feed-ip">${e.ip}</span>
      <span class="feed-time">${timeStr}</span>
    </div>
    <div class="feed-detail">${e.category} → ${e.target}</div>
    <div class="feed-country">${e.flag} ${e.srcCountry} &nbsp;·&nbsp; Score: ${e.score}</div>
  `;
  feed.insertBefore(el, feed.firstChild);
  if (feed.children.length > 80) feed.removeChild(feed.lastChild);
}

function updateStats() {
  document.getElementById('h-total').textContent = totalThreats.toLocaleString();
  document.getElementById('h-ips').textContent = uniqueIPs.size.toLocaleString();
  document.getElementById('s-hour').textContent = totalThreats;
  document.getElementById('s-ips').textContent = uniqueIPs.size;
  document.getElementById('s-countries').textContent = uniqueCountries.size;

  const rate = (lastMinuteEvents.length / 60).toFixed(1);
  document.getElementById('s-rate').textContent = rate;

  const topCat = Object.entries(categories).sort((a,b) => b[1]-a[1])[0];
  if (topCat) document.getElementById('h-cat').textContent = topCat[0].split(' ')[0].toUpperCase();

  const level = totalThreats > 200 ? 'CRITICAL' : totalThreats > 100 ? 'HIGH' : 'ELEVATED';
  document.getElementById('h-level').textContent = level;
}

function updateCountries() {
  const sorted = Object.entries(countryCounts).sort((a,b) => b[1]-a[1]).slice(0, 6);
  const max = sorted[0]?.[1] || 1;
  const list = document.getElementById('country-list');
  list.innerHTML = sorted.map(([country, count]) => {
    const d = COUNTRY_DATA[country];
    const pct = (count / max * 100).toFixed(0);
    return `
      <div class="country-item">
        <span class="country-flag">${d?.flag || '🌐'}</span>
        <span class="country-name">${country}</span>
        <div class="country-bar-wrap"><div class="country-bar" style="width:${pct}%"></div></div>
        <span class="country-count">${count}</span>
      </div>`;
  }).join('');
}

// ─── WEBSOCKET / DEMO ────────────────────────────────────────────────────────
function connectWebSocket() {
  const ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('conn-dot').classList.remove('error');
    document.getElementById('conn-text').textContent = 'Connected to backend';
    document.getElementById('map-status').textContent = 'LIVE — MONITORING GLOBAL THREAT VECTORS';
  };
  ws.onmessage = (msg) => {
    try { processEvent(JSON.parse(msg.data)); } catch(e) {}
  };
  ws.onclose = () => {
    document.getElementById('conn-dot').classList.add('error');
    document.getElementById('conn-text').textContent = 'Reconnecting...';
    setTimeout(connectWebSocket, 3000);
  };
  ws.onerror = () => ws.close();
}

function startDemo() {
  document.getElementById('conn-dot').classList.remove('error');
  document.getElementById('conn-text').textContent = 'Demo mode — connect backend for live data';
  document.getElementById('map-status').textContent = 'DEMO MODE — SIMULATED THREAT VECTORS';

  // Initial burst
  for (let i = 0; i < 8; i++) setTimeout(() => processEvent(generateDemoEvent()), i * 200);

  // Ongoing stream
  function scheduleNext() {
    const delay = 400 + Math.random() * 1200;
    setTimeout(() => { processEvent(generateDemoEvent()); scheduleNext(); }, delay);
  }
  scheduleNext();
}

if (DEMO_MODE) {
  startDemo();
} else {
  connectWebSocket();
}
</script>
